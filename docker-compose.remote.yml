services:
  bob-api:
    ports:
      - "127.0.0.1:8787:8787"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      bob-api:
        condition: service_started
    environment:
      BOB_PUBLIC_HOST: ${BOB_PUBLIC_HOST:?BOB_PUBLIC_HOST must be set}
      BOB_TLS_EMAIL: ${BOB_TLS_EMAIL:?BOB_TLS_EMAIL must be set}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
